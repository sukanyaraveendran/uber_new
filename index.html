<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Uber Earnings Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28a745">

<!-- iPhone PWA Support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Uber Tracker">

<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="container">

<h1>🚕 Uber Earnings Tracker</h1>

<div class="card">

<input type="date" id="date">

<input type="number" id="earnings" placeholder="Daily Uber Earnings ₹">

<input type="number" id="otherEarnings" placeholder="Other Earnings ₹">

<input type="number" id="fuel" placeholder="Fuel Expenses ₹">

<input type="number" id="rentEmi" placeholder="Daily Rent/EMI ₹">

<input type="number" id="foodTeaWater" placeholder="Food, Tea, Water ₹">

<input type="number" id="toll" placeholder="Toll ₹">

<input type="number" id="dailyExpense" placeholder="Other Expenses ₹">

<input type="number" id="otherExpense" placeholder="Service / Maintenance / Insurance ₹">

<button id="saveBtn" onclick="addEntry()">Save</button>
<button id="cancelEditBtn" type="button" class="cancel-edit hidden" onclick="cancelEdit()">Cancel edit</button>

</div>

<div class="stats">

<div class="stat">
<h3>Total Balance</h3>
<p id="totalBalance">₹0</p>
</div>

<div class="stat">
<h3>Today's Profit</h3>
<p id="todayProfit">₹0</p>
</div>

<div class="stat">
<h3>Monthly Profit</h3>
<p id="monthlyProfit">₹0</p>
</div>

</div>

<div class="card entries-card">
<div class="mobile-entries" id="mobileEntries" aria-label="Transaction list"></div>
<div class="mobile-summary" id="mobileSummary" aria-label="Totals summary"></div>

<div class="table-wrapper desktop-only">
<table id="entriesTable">

<thead>
<tr>
<th rowspan="2">Date</th>
<th colspan="3" class="earnings-group">Earnings</th>
<th colspan="7" class="expenses-group">Expenses</th>
<th rowspan="2">Profit</th>
<th rowspan="2">Actions</th>
</tr>
<tr>
<th>Uber</th>
<th>Other</th>
<th>Total</th>
<th>Fuel</th>
<th>Rent/EMI</th>
<th>Food</th>
<th>Toll</th>
<th>Other Exp.</th>
<th>Service</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

<tfoot>
<tr class="totals-row">
<td>Total</td>
<td id="totalUber">₹0</td>
<td id="totalOtherEarnings">₹0</td>
<td id="totalEarnings">₹0</td>
<td id="totalFuel">₹0</td>
<td id="totalRentEmi">₹0</td>
<td id="totalFoodTeaWater">₹0</td>
<td id="totalToll">₹0</td>
<td id="totalDaily">₹0</td>
<td id="totalOtherExpense">₹0</td>
<td id="totalExpenses">₹0</td>
<td id="totalProfit" class="profit-positive">₹0</td>
<td></td>
</tr>
</tfoot>

</table>
</div>

<div class="download-actions">
<button type="button" class="btn-pdf" onclick="exportPDF()">Download PDF</button>
<button type="button" class="btn-csv" onclick="exportCSV()">Download Excel</button>
</div>

<div id="pdfReport" class="pdf-report" aria-hidden="true"></div>

</div>

</div>

<script src="./libs/html2pdf.bundle.min.js" id="html2pdfScript"></script>
<script src="./app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("./service-worker.js", { scope: "./" })
      .then((registration) => {

        registration.update();

        setInterval(() => {
          registration.update();
        }, 60000);

      })
      .catch((err) => {
        console.error("SW registration failed:", err);
      });
  });
}
</script>

</body>
</html>
